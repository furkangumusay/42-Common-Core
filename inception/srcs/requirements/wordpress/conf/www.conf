[www]
user = www-data
group = www-data

; Listen on port 9000 for connections from nginx
listen = 0.0.0.0:9000

listen.owner = www-data
listen.group = www-data

pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Chdir to this directory at the start
chdir = /var/www/html

; Clear environment in FPM workers
clear_env = no
